<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abono a Meta - Mi Presupuesto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    #liveAlertPlaceholder {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1050;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>

<body>

  <div id="liveAlertPlaceholder"></div>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-sm" style="width: 400px; border-radius: 15px;">

      <div class="text-center mb-3">
        <img src="savings.png" alt="Logo" class="mb-2" style="width: 60px;">
        <h4 class="mt-2 text-primary">Abono a Meta</h4>
        <p class="text-muted small">¡Un paso más cerca de tu objetivo!</p>
      </div>

      <div id="registro-abono">
        <form id="formAbono">
          <div class="mb-3">
            <label class="form-label font-weight-bold">Fecha de abono</label>
            <input type="date" id="fechaInput" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Seleccionar Meta</label>
            <select class="form-select" required>
              <option value="" selected disabled>¿A qué meta va el dinero?</option>
              <option value="viaje">Viaje a Cartagena</option>
              <option value="pc">Nuevo Computador</option>
              <option value="emergencia">Fondo de Emergencia</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Monto a ahorrar</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" class="form-control" placeholder="0.00" required>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary text-white">
              <i class="bi bi-plus-circle me-2"></i>Registrar Abono
            </button>
            <a href="resumen.html" class="btn btn-outline-secondary">
              <i class="bi bi-house-door me-2"></i>Regresar al inicio
            </a>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script>
    // Autocompletar con la fecha de hoy
    document.addEventListener('DOMContentLoaded', () => {
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInput').value = hoy;
    });

    const alertPlaceholder = document.getElementById('liveAlertPlaceholder');
    const form = document.getElementById('formAbono');

    const appendAlert = (message, type) => {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = [
        `<div class="alert alert-${type} alert-dismissible fade show" role="alert">`,
        `   <div>${message}</div>`,
        '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
        '</div>'
      ].join('');

      alertPlaceholder.append(wrapper);

      setTimeout(() => {
        const alert = bootstrap.Alert.getOrCreateInstance(wrapper.querySelector('.alert'));
        if (alert) alert.close();
      }, 3000);
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      appendAlert('¡Abono registrado! Tu meta está más cerca.', 'success');
      form.reset(); 
      
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInput').value = hoy;
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
