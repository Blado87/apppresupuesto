<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Ingreso - Mi Presupuesto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* Estilo para que la alerta flote sobre el contenido */
    #liveAlertPlaceholder {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1050;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>

<body>

  <div id="liveAlertPlaceholder"></div>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-sm" style="width: 400px; border-radius: 15px;">

      <div class="text-center mb-3">
        <img src="wallet.png" alt="Logo" class="mb-2" style="width: 60px;">
        <h4>Nuevo Ingreso</h4>
        <p class="text-muted small">Registra tus ganancias actuales</p>
      </div>

      <div id="registro-ingreso">
        <form id="formIngreso">
          <div class="mb-3">
            <label class="form-label font-weight-bold">Fecha</label>
            <input type="date" id="fechaInput" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Monto de dinero</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" class="form-control" placeholder="0.00" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Concepto</label>
            <select class="form-select" required>
              <option value="" selected disabled>Selecciona una opción</option>
              <option value="sueldo">Sueldo</option>
              <option value="venta">Venta</option>
              <option value="regalo">Otros</option>
            </select>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save me-2"></i>Guardar Ingreso
            </button>
            <a href="resumen.html" class="btn btn-outline-secondary">
              <i class="bi bi-house-door me-2"></i>Regresar al inicio
            </a>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script>
    // 1. Autocompletar la fecha actual al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInput').value = hoy;
    });

    // 2. Manejar el evento de guardado y la alerta
    const alertPlaceholder = document.getElementById('liveAlertPlaceholder');
    const form = document.getElementById('formIngreso');

    const appendAlert = (message, type) => {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = [
        `<div class="alert alert-${type} alert-dismissible fade show" role="alert">`,
        `   <div>${message}</div>`,
        '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
        '</div>'
      ].join('');

      alertPlaceholder.append(wrapper);

      // Cerrar la alerta automáticamente después de 3 segundos
      setTimeout(() => {
        const alert = bootstrap.Alert.getOrCreateInstance(wrapper.querySelector('.alert'));
        alert.close();
      }, 3000);
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault(); // Evita que la página se recargue
      appendAlert('Ingreso registrado correctamente!', 'success');
      form.reset(); // Limpia el formulario tras guardar
      
      // Re-poner la fecha de hoy después de limpiar
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInput').value = hoy;
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
