<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- chastJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container text-center" style="padding: 0; margin-bottom: 100px;">
        <!--------------------------- ENCABEZADO --------------------------->
        <div class="barra-titulo shadow-sm" style="width: 100%; padding-top: 20px; margin-bottom: 20px;">

        <!--------------------------- CONTENIDO PRICIPAL --------------------------->
        <div >

            <div style="margin-top: 50px;">

                <canvas id="grafica-resumen"></canvas>
            </div>

            <!-- Tabla -->
            <div style="margin-top: 50px;">
                <h4 class="text-secondary text-start ms-3 mt-4">Tabla balance general</h4>
                <div id="tabla-resumen" style="width: 95%;">
                    
                </div>
            </div>

            <!-- Botones -->
            <div>
                <h4 class="text-secondary text-start ms-3 mt-4">¿Qué quieres hacer?</h4>
                <div>
                    <button type="button" class="btn btn-success btn-lg">+ Ingreso</button>
                    <button type="button" class="btn btn-warning btn-lg">+ Gasto</button>
                    <button type="button" class="btn btn-primary btn-lg">+ Ahorro</button>
                </div>
            </div>

        </div>

    </div>
    <!--------------------------- NAVBAR INFERIOR --------------------------->
    <div class="nav-bottom d-flex justify-content-around">

        <a href="#" class="nav-item-custom active">
            <i class="bi bi-house"></i>
            Inicio

        <a href="ingresos.html" class="nav-item-custom">
            <i class="bi bi-wallet2"></i>
            Ingresos
        </a>

        <a href="gastos.html" class="nav-item-custom">
            <i class="bi bi-bag"></i>
            Gastos
        </a>

        <a href="ahorros.html" class="nav-item-custom">
            <i class="bi bi-piggy-bank"></i>
            Ahorros
        </a>

        <a href="chatIA.html" class="nav-item-custom">
            <i class="bi bi-robot"></i>
            ChatIA
        </a>




    </div>

    <script src="data.js"></script>
    <!-- boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // ---------------------------------------------------------------------- GRAFICA DE RESUMEN
        function graficaResumen() {
            const ctx = document.getElementById("grafica-resumen").getContext("2d");

            let totalIngresos = 0;
            let totalGastos = 0;

            // Función para limpiar el monto "$2.500.000" -> 2500000
            function limpiarMonto(monto) {
                return Number(monto.replace(/\$/g, "").replace(/\./g, ""));
            }

            // Recorrer meses y movimientos
            presupuesto.meses.forEach(mes => {
                mes.movimientos.forEach(mov => {
                    const valor = limpiarMonto(mov.monto);

                    if (mov.tipo === "ingreso") {
                        totalIngresos += valor;
                    } else if (mov.tipo === "gasto") {
                        totalGastos += valor;
                    }
                });
            });

            const ahorro = totalIngresos - totalGastos;

            // Crear gráfica
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Ingresos", "Gastos", "Ahorro"],
                    datasets: [{
                        data: [totalIngresos, totalGastos, ahorro],
                        backgroundColor: [
                            "#198754", // verde
                            "#ffc107", // rojo
                            "#0d6efd"  // azul
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    animation: {
                        duration: 1500,
                        easing: "easeOutQuart"
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            display: false // ❌ sin labels eje Y
                        },
                        x: {
                            ticks: {
                                color: "#333",
                                font: {
                                    size: 14
                                }
                            }
                        }
                    }
                }
            });
        }

        graficaResumen()


    // ---------------------------------------------------------------------- TABLA DE RESUMEN
        function tablaResumen() {
    const contenedor = document.getElementById("tabla-resumen");

    let totalIngresos = 0;
    let totalGastos = 0;

    function limpiarMonto(monto) {
        return Number(monto.replace(/\$/g, "").replace(/\./g, ""));
    }

    function formatearCOP(valor) {
        return valor.toLocaleString("es-CO", {
            style: "currency",
            currency: "COP",
            minimumFractionDigits: 0
        });
    }

    // Calcular totales
    presupuesto.meses.forEach(mes => {
        mes.movimientos.forEach(mov => {
            const valor = limpiarMonto(mov.monto);

            if (mov.tipo === "ingreso") {
                totalIngresos += valor;
            } else if (mov.tipo === "gasto") {
                totalGastos += valor;
            }
        });
    });

    const ahorro = totalIngresos - totalGastos;

    // Crear tabla
    const tabla = document.createElement("table");
    tabla.style.width = "100%";
    tabla.style.borderCollapse = "collapse";

    const datos = [
        { icono: "💰", nombre: "Ingresos", total: totalIngresos },
        { icono: "💸", nombre: "Gastos", total: totalGastos },
        { icono: "🏦", nombre: "Ahorro", total: ahorro }
    ];

    datos.forEach(item => {
        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td style="padding:10px; font-size:20px;">${item.icono}</td>
            <td style="padding:10px;">${item.nombre}</td>
            <td style="padding:10px; text-align:right; font-weight:bold;">
                ${formatearCOP(item.total)}
            </td>
        `;

        tabla.appendChild(fila);
    });

    // Limpiar antes de insertar (por si se vuelve a ejecutar)
    contenedor.innerHTML = "";
    contenedor.appendChild(tabla);
}

tablaResumen()

    </script>
</body>

</html>
