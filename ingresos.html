<head>

<body>

        </div>


    </div>



    <!--------------------------- NAVBAR INFERIOR --------------------------->
    <div class="nav-bottom d-flex justify-content-around">

        <a href="resumen.html" class="nav-item-custom">

    <script src="data.js"></script>
    <!-- boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // ----------------------------------TABLA DE INGRESOS
        function tablaIngresos() {
            const contenedor = document.getElementById("tabla-ingreso");

            function limpiarMonto(monto) {
                return Number(monto.replace(/\$/g, "").replace(/\./g, ""));
            }

            function formatearCOP(valor) {
                return valor.toLocaleString("es-CO", {
                    style: "currency",
                    currency: "COP",
                    minimumFractionDigits: 0
                });
            }

            const tabla = document.createElement("table");
            tabla.style.width = "100%";
            tabla.style.borderCollapse = "collapse";

            // Encabezado (opcional pero recomendado)
            tabla.innerHTML = `
        <thead>
            <tr>
                <th style="text-align:left; padding:8px;">Icono</th>
                <th style="text-align:left; padding:8px;">Concepto</th>
                <th style="text-align:right; padding:8px;">Monto</th>
            </tr>
        </thead>
        <tbody></tbody>
    `;

            const tbody = tabla.querySelector("tbody");

            // Recorrer datos
            presupuesto.meses.forEach(mes => {
                mes.movimientos.forEach(mov => {
                    if (mov.tipo === "ingreso") {
                        const fila = document.createElement("tr");

                        fila.innerHTML = `
                    <td style="padding:8px;">${mov.emoji}</td>
                    <td style="padding:8px;">${mov.categoria}</td>
                    <td style="padding:8px; text-align:right; font-weight:bold;">
                        ${formatearCOP(limpiarMonto(mov.monto))}
                    </td>
                `;

                        tbody.appendChild(fila);
                    }
                });
            });

            // Limpiar e insertar
            contenedor.innerHTML = "";
            contenedor.appendChild(tabla);
        }

        tablaIngresos()


        // ------------------------------------------------------------------------- grafica

        function graficaIngresos() {
            const ctx = document.getElementById("grafica-ingreso").getContext("2d");

            function limpiarMonto(monto) {
                return Number(monto.replace(/\$/g, "").replace(/\./g, ""));
            }

            function formatearCOP(valor) {
                return valor.toLocaleString("es-CO", {
                    style: "currency",
                    currency: "COP",
                    minimumFractionDigits: 0
                });
            }

            const labels = [];
            const dataIngresos = [];

            // Recorrer meses
            presupuesto.meses.forEach(mes => {
                let totalMes = 0;

                mes.movimientos.forEach(mov => {
                    if (mov.tipo === "ingreso") {
                        totalMes += limpiarMonto(mov.monto);
                    }
                });

                labels.push(mes.mes);
                dataIngresos.push(totalMes);
            });

            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Ingresos",
                        data: dataIngresos,
                        backgroundColor: "#4CAF50",
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    animation: {
                        duration: 1500,
                        easing: "easeOutQuart"
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return formatearCOP(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            display: false // ❌ sin eje Y
                        },
                        x: {
                            ticks: {
                                color: "#333",
                                font: {
                                    size: 14
                                }
                            }
                        }
                    }
                }
            });
        }

        graficaIngresos()

    </script>
</body>
