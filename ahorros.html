    <script>
function graficaAhorros() {
    const contenedor = document.getElementById("grafica-ahorros");

    function limpiarMonto(monto) {
        return Number(monto.replace(/\$/g, "").replace(/\./g, ""));
    }

    function formatearCOP(valor) {
        return valor.toLocaleString("es-CO", {
            style: "currency",
            currency: "COP",
            minimumFractionDigits: 0
        });
    }

    contenedor.innerHTML = ""; // limpiar

    presupuesto.metasAhorro.forEach((meta, index) => {
        const metaTotal = limpiarMonto(meta.meta);
        const avance = limpiarMonto(meta.avance);

        const porcentaje = Math.min((avance / metaTotal) * 100, 100);

        const card = document.createElement("div");
        card.className = "mb-4";

        card.innerHTML = `
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">${meta.proposito}</h5>

                    <div class="d-flex justify-content-between mb-2">
                        <span><strong>Meta:</strong> ${formatearCOP(metaTotal)}</span>
                        <span><strong>Ahorrado:</strong> ${formatearCOP(avance)}</span>
                    </div>

                    <div class="progress" style="height: 20px;">
                        <div 
                            id="barra-${index}"
                            class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                            role="progressbar"
                            style="width: 0%"
                        >
                            0%
                        </div>
                    </div>
                </div>
            </div>
        `;

        contenedor.appendChild(card);

        // Animación de carga
        setTimeout(() => {
            const barra = document.getElementById(`barra-${index}`);
            barra.style.width = porcentaje + "%";
            barra.textContent = porcentaje.toFixed(0) + "%";
        }, 200);
    });
}

graficaAhorros();

    </script>
